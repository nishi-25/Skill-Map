<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>パスワードの設定 - Skill View.</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background:linear-gradient(135deg,#1a0900 0%,#431407 50%,#9a3412 100%); min-height:100vh; display:flex; align-items:center; justify-content:center; font-family:'Inter','Noto Sans JP',sans-serif; }
    .auth-card { width:100%;max-width:440px;background:rgba(255,255,255,.97);border-radius:24px;box-shadow:0 20px 60px rgba(0,0,0,.4);padding:2.5rem 2rem;animation:cardIn .5s ease both; }
    @keyframes cardIn { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
    .brand{font-size:1.4rem;font-weight:800;color:#431407;}
    .brand span{background:linear-gradient(135deg,#f97316,#fdba74);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .btn-primary{background:linear-gradient(135deg,#f97316,#ea580c);border:none;}
    .btn-primary:hover{background:linear-gradient(135deg,#ea580c,#c2410c);}
    .form-control:focus{border-color:#f97316;box-shadow:0 0 0 .2rem rgba(249,115,22,.2);}
    .strength-bar{height:4px;border-radius:2px;background:#e2e8f0;overflow:hidden;transition:all .3s;}
    .strength-bar-inner{height:100%;border-radius:2px;transition:width .3s,background .3s;}
  </style>
</head>
<body>
<div class="auth-card">
  <div class="text-center mb-4">
    <div style="width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,#22c55e,#16a34a);display:inline-flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(34,197,94,.3);">
      <i class="bi bi-key-fill" style="font-size:1.5rem;color:#fff;"></i>
    </div>
    <div class="brand mt-3">新しい<span>パスワードを設定</span></div>
    <p class="text-muted small mt-1">仮パスワードでログインしました。<br>新しいパスワードを設定してください。</p>
  </div>

  {% if error %}
  <div class="alert alert-danger py-2 small" style="border-radius:10px;">
    <i class="bi bi-exclamation-triangle-fill me-1"></i>{{ error }}
  </div>
  {% endif %}

  <div class="alert d-flex align-items-center gap-2 mb-3"
       style="background:#f0fdf4;border:1.5px solid #86efac;border-left:4px solid #22c55e;border-radius:12px;padding:.7rem 1rem;font-size:.82rem;color:#166534;">
    <i class="bi bi-shield-check flex-shrink-0"></i>
    <span>ログイン中: <strong>{{ current_user.display_name or current_user.username }}</strong></span>
  </div>

  <form method="post" action="/change-password" onsubmit="return validateForm()">
    <div class="mb-3">
      <label class="form-label small fw-semibold">新しいパスワード <span class="text-danger">*</span></label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-lock"></i></span>
        <input type="password" name="new_password" id="newPw" class="form-control" required
               minlength="8" placeholder="8文字以上" style="border-radius:0 12px 12px 0;"
               oninput="checkStrength(this.value)">
      </div>
      <div class="strength-bar mt-1"><div class="strength-bar-inner" id="strengthBar" style="width:0%;"></div></div>
      <div class="mt-1 small text-muted" id="strengthLabel"></div>
    </div>
    <div class="mb-4">
      <label class="form-label small fw-semibold">パスワード確認 <span class="text-danger">*</span></label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
        <input type="password" name="confirm_password" id="confirmPw" class="form-control" required
               placeholder="もう一度入力" style="border-radius:0 12px 12px 0;">
      </div>
      <div class="mt-1 small" id="matchLabel"></div>
    </div>
    <button type="submit" class="btn btn-primary w-100 fw-semibold py-2" style="border-radius:12px;">
      <i class="bi bi-check-lg me-2"></i>パスワードを設定してログイン
    </button>
  </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
function checkStrength(pw) {
  const bar = document.getElementById('strengthBar');
  const lbl = document.getElementById('strengthLabel');
  let score = 0;
  if (pw.length >= 8) score++;
  if (pw.length >= 12) score++;
  if (/[A-Z]/.test(pw)) score++;
  if (/[0-9]/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;
  const levels = [
    { w:'20%', bg:'#ef4444', t:'弱い' },
    { w:'40%', bg:'#f97316', t:'やや弱い' },
    { w:'60%', bg:'#f59e0b', t:'普通' },
    { w:'80%', bg:'#84cc16', t:'強い' },
    { w:'100%', bg:'#22c55e', t:'とても強い' },
  ];
  const lv = Math.min(score - 1, 4);
  if (lv >= 0) {
    bar.style.width = levels[lv].w;
    bar.style.background = levels[lv].bg;
    lbl.textContent = levels[lv].t;
    lbl.style.color = levels[lv].bg;
  }
}
function validateForm() {
  const a = document.getElementById('newPw').value;
  const b = document.getElementById('confirmPw').value;
  const lbl = document.getElementById('matchLabel');
  if (a !== b) {
    lbl.textContent = 'パスワードが一致しません';
    lbl.style.color = '#ef4444';
    return false;
  }
  lbl.textContent = '✓ 一致しています';
  lbl.style.color = '#22c55e';
  return true;
}
document.getElementById('confirmPw').addEventListener('input', function() {
  const a = document.getElementById('newPw').value;
  const lbl = document.getElementById('matchLabel');
  if (this.value && a !== this.value) {
    lbl.textContent = 'パスワードが一致しません';
    lbl.style.color = '#ef4444';
  } else if (this.value) {
    lbl.textContent = '✓ 一致しています';
    lbl.style.color = '#22c55e';
  }
});
</script>
</body>
</html>
