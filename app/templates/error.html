<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>エラー {{ code }} - スキルマップ</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: #f1f3f9; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  </style>
</head>
<body>
<div class="text-center p-4">
  <div style="font-size:5rem;color:#fed7aa;">
    {% if code == 404 %}<i class="bi bi-search"></i>
    {% elif code == 403 %}<i class="bi bi-shield-x"></i>
    {% else %}<i class="bi bi-exclamation-triangle"></i>{% endif %}
  </div>
  <h1 class="display-4 fw-bold" style="color:#431407;">{{ code }}</h1>
  <p class="text-muted mb-4">{{ message }}</p>
  <a href="/dashboard" class="btn btn-primary">
    <i class="bi bi-house me-1"></i>ダッシュボードへ戻る
  </a>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
