<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>パスワードリセット依頼 - Skill View.</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background:linear-gradient(135deg,#1a0900 0%,#431407 50%,#9a3412 100%); min-height:100vh; display:flex; align-items:center; justify-content:center; font-family:'Inter','Noto Sans JP',sans-serif; }
    .auth-card { width:100%;max-width:460px;background:rgba(255,255,255,.97);border-radius:24px;box-shadow:0 20px 60px rgba(0,0,0,.4);padding:2.5rem 2rem;animation:cardIn .5s ease both; }
    @keyframes cardIn { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
    .brand{font-size:1.5rem;font-weight:800;color:#431407;}
    .brand span{background:linear-gradient(135deg,#f97316,#fdba74);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .step-card{background:#f8fafc;border-radius:14px;padding:.9rem 1.1rem;border:1px solid #e2e8f0;}
    .step-num{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#f97316,#ea580c);color:#fff;font-weight:700;font-size:.8rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .btn-primary{background:linear-gradient(135deg,#f97316,#ea580c);border:none;}
    .btn-primary:hover{background:linear-gradient(135deg,#ea580c,#c2410c);}
  </style>
</head>
<body>
<div class="auth-card">
  <div class="text-center mb-4">
    <div style="width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,#f59e0b,#f97316);display:inline-flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(245,158,11,.3);">
      <i class="bi bi-person-lock" style="font-size:1.5rem;color:#fff;"></i>
    </div>
    <div class="brand mt-3">パスワード<span>リセット依頼</span></div>
  </div>

  <div class="alert d-flex align-items-start gap-2 mb-3"
       style="background:#fff7ed;border:1.5px solid #fed7aa;border-left:4px solid #f97316;border-radius:12px;padding:.9rem 1rem;">
    <i class="bi bi-info-circle-fill mt-1" style="color:#f97316;flex-shrink:0;"></i>
    <div style="font-size:.85rem;color:#92400e;">
      パスワードのリセットは <strong>管理者（Admin）</strong> が仮パスワードを発行します。<br>
      以下の手順で対応してもらってください。
    </div>
  </div>

  <div class="d-flex flex-column gap-2 mb-4">
    <div class="step-card d-flex align-items-start gap-3">
      <div class="step-num">1</div>
      <div>
        <div class="fw-semibold" style="font-size:.88rem;">管理者に連絡する</div>
        <div class="text-muted" style="font-size:.78rem;">担当の Admin に<br>パスワードリセットを依頼してください。</div>
      </div>
    </div>
    <div class="step-card d-flex align-items-start gap-3">
      <div class="step-num">2</div>
      <div>
        <div class="fw-semibold" style="font-size:.88rem;">仮パスワードを受け取る</div>
        <div class="text-muted" style="font-size:.78rem;">管理者が管理画面から仮パスワードを発行し、<br>あなたに伝えます。</div>
      </div>
    </div>
    <div class="step-card d-flex align-items-start gap-3">
      <div class="step-num">3</div>
      <div>
        <div class="fw-semibold" style="font-size:.88rem;">仮パスワードでログインする</div>
        <div class="text-muted" style="font-size:.78rem;">仮パスワードでログインすると、<br>新しいパスワードの設定画面が表示されます。</div>
      </div>
    </div>
  </div>

  <a href="/login" class="btn btn-primary w-100 fw-semibold py-2" style="border-radius:12px;">
    <i class="bi bi-arrow-left me-2"></i>ログイン画面に戻る
  </a>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
