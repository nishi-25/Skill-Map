<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン - スキルマップ</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.bunny.net">
  <link href="https://fonts.bunny.net/css?family=inter:300,400,500,600,700|noto-sans-jp:400,500,700&display=swap" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #0f0e2a 0%, #1e1b4b 50%, #312e81 100%);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      font-family: 'Inter', 'Noto Sans JP', sans-serif;
      overflow: hidden;
    }
    /* Background animated dots */
    body::before {
      content: '';
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background-image: radial-gradient(circle at 20% 50%, rgba(99,102,241,.15) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(56,189,248,.1) 0%, transparent 50%),
                        radial-gradient(circle at 50% 80%, rgba(168,85,247,.1) 0%, transparent 50%);
      pointer-events: none;
      animation: bgPulse 8s ease-in-out infinite alternate;
    }
    @keyframes bgPulse {
      0% { opacity: .7; }
      100% { opacity: 1; }
    }
    .auth-card {
      width: 100%; max-width: 420px;
      background: rgba(255,255,255,.97);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,.4), 0 0 0 1px rgba(255,255,255,.1);
      border: none;
      padding: 2.5rem 2rem;
      position: relative;
      z-index: 1;
      animation: cardIn .5s cubic-bezier(.4,0,.2,1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(30px) scale(.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .brand { font-size: 1.8rem; font-weight: 800; color: #1e1b4b; }
    .brand span { background: linear-gradient(135deg, #6366f1, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .btn-primary {
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      border: none;
      transition: transform .2s, box-shadow .2s;
    }
    .btn-primary:hover {
      background: linear-gradient(135deg, #4f46e5, #4338ca);
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(99,102,241,.4);
    }
    .form-control {
      border-radius: 10px;
      transition: border-color .2s, box-shadow .2s;
    }
    .form-control:focus { border-color: #6366f1; box-shadow: 0 0 0 .2rem rgba(99,102,241,.15); }
    .input-group-text { border-radius: 10px 0 0 10px; }
    .alert { border-radius: 10px; border: none; }
    .float-orb {
      position: fixed; border-radius: 50%;
      pointer-events: none; z-index: 0;
      animation: float 6s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }
  </style>
</head>
<body>
<!-- Floating orbs -->
<div class="float-orb" style="width:200px;height:200px;background:rgba(99,102,241,.08);top:10%;left:5%;animation-delay:0s;"></div>
<div class="float-orb" style="width:150px;height:150px;background:rgba(56,189,248,.06);top:60%;right:10%;animation-delay:2s;"></div>
<div class="float-orb" style="width:100px;height:100px;background:rgba(168,85,247,.07);bottom:15%;left:20%;animation-delay:4s;"></div>

<div class="auth-card">
  <div class="text-center mb-4">
    <div style="width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,#6366f1,#a78bfa);display:inline-flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(99,102,241,.3);">
      <i class="bi bi-map" style="font-size:1.8rem;color:#fff;"></i>
    </div>
    <div class="brand mt-3">スキル<span>マップ</span></div>
    <p class="text-muted small mt-1">スキル管理システムへようこそ</p>
  </div>

  {% if setup_done %}
  <div class="alert alert-success py-2 small">
    <i class="bi bi-check-circle-fill me-1"></i>セットアップ完了。管理者アカウントでログインしてください。
  </div>
  {% endif %}

  {% if password_reset %}
  <div class="alert alert-success py-2 small">
    <i class="bi bi-check-circle-fill me-1"></i>パスワードを変更しました。
  </div>
  {% endif %}

  {% if error %}
  <div class="alert alert-danger py-2 small" style="animation: cardIn .3s ease both;">
    <i class="bi bi-exclamation-triangle-fill me-1"></i>{{ error }}
  </div>
  {% endif %}

  <form method="post" action="/login">
    <div class="mb-3">
      <label class="form-label small fw-semibold">ユーザー名</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-person"></i></span>
        <input type="text" name="username" class="form-control" required autofocus placeholder="username">
      </div>
    </div>
    <div class="mb-4">
      <label class="form-label small fw-semibold">パスワード</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-lock"></i></span>
        <input type="password" name="password" class="form-control" required placeholder="••••••••">
      </div>
    </div>
    <button type="submit" class="btn btn-primary w-100 fw-semibold py-2" style="border-radius:12px;">
      <i class="bi bi-box-arrow-in-right me-2"></i>ログイン
    </button>
  </form>

  <div class="text-center mt-3">
    <a href="/forgot-password" class="text-muted small text-decoration-none">
      <i class="bi bi-question-circle me-1"></i>ユーザー名・パスワードをお忘れの方
    </a>
  </div>

  <hr class="my-3">
  <div class="text-center">
    <small class="text-muted">アカウントをお持ちでない方</small><br>
    <a href="/register" class="btn btn-outline-secondary btn-sm mt-2 w-100" style="border-radius:12px;">
      <i class="bi bi-person-plus me-1"></i>新規登録
    </a>
  </div>
  <div class="text-center mt-3">
    <a href="/manual" class="text-muted small text-decoration-none">
      <i class="bi bi-book me-1"></i>利用マニュアル
    </a>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
