<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>承認待ち - Skill View.</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.bunny.net">
  <link href="https://fonts.bunny.net/css?family=inter:400,500,600,700|noto-sans-jp:400,500,700&display=swap" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #1a0900 0%, #431407 50%, #9a3412 100%);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      font-family: 'Inter', 'Noto Sans JP', sans-serif;
      overflow: hidden;
    }
    body::before {
      content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background-image: radial-gradient(circle at 20% 50%, rgba(249,115,22,.15) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(56,189,248,.1) 0%, transparent 50%);
      pointer-events: none;
      animation: bgPulse 8s ease-in-out infinite alternate;
    }
    @keyframes bgPulse { 0% { opacity: .7; } 100% { opacity: 1; } }
    .card-box {
      width: 100%; max-width: 460px;
      background: rgba(255,255,255,.97);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,.4), 0 0 0 1px rgba(255,255,255,.1);
      padding: 2.5rem 2rem; text-align: center;
      position: relative; z-index: 1;
      animation: cardIn .5s cubic-bezier(.4,0,.2,1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(30px) scale(.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .status-icon {
      width: 80px; height: 80px; border-radius: 50%;
      background: linear-gradient(135deg, #fef3c7, #fde68a);
      display: inline-flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 24px rgba(245,158,11,.2);
    }
    .status-icon i { font-size: 2rem; color: #f59e0b; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.05);opacity:.7} }
    .step-list { text-align: left; margin: 1.2rem 0; }
    .step-item {
      display: flex; align-items: flex-start; gap: .7rem;
      padding: .6rem 0; font-size: .88rem; color: #475569;
    }
    .step-num {
      width: 24px; height: 24px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: .72rem; font-weight: 700; flex-shrink: 0;
    }
    .step-done { background: #dcfce7; color: #22c55e; }
    .step-current { background: linear-gradient(135deg,#fef3c7,#fde68a); color: #f59e0b; }
    .step-next { background: #f1f5f9; color: #94a3b8; }
    .mail-hint {
      background: linear-gradient(135deg, #fff7ed, #ffedd5);
      border-radius: 12px; padding: 1rem 1.2rem;
      margin-top: 1rem;
    }
    .float-orb {
      position: fixed; border-radius: 50%;
      pointer-events: none; z-index: 0;
      animation: float 6s ease-in-out infinite;
    }
    @keyframes float { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-20px);} }
  </style>
</head>
<body>
<div class="float-orb" style="width:180px;height:180px;background:rgba(249,115,22,.08);top:15%;left:8%;animation-delay:0s;"></div>
<div class="float-orb" style="width:120px;height:120px;background:rgba(245,158,11,.06);bottom:20%;right:12%;animation-delay:3s;"></div>

<div class="card-box">
  <div class="status-icon mx-auto">
    <i class="bi bi-hourglass-split"></i>
  </div>

  <h3 class="mt-3 fw-bold" style="color:#431407;">登録が完了しました</h3>

  <p class="text-muted mt-2" style="font-size:.92rem;">
    {% if current_user %}
    <strong style="color:#431407;">{{ current_user.display_name or current_user.username }}</strong> さん、<br>
    {% endif %}
    ご登録ありがとうございます！
  </p>

  <!-- ステップ表示 -->
  <div class="step-list">
    <div class="step-item">
      <div class="step-num step-done"><i class="bi bi-check"></i></div>
      <div><strong style="color:#431407;">アカウント登録</strong><br><span class="text-muted" style="font-size:.8rem;">登録情報を送信しました</span></div>
    </div>
    <div class="step-item">
      <div class="step-num step-current"><i class="bi bi-clock"></i></div>
      <div><strong style="color:#f59e0b;">管理者による承認待ち</strong><br><span class="text-muted" style="font-size:.8rem;">管理者が申請を確認中です</span></div>
    </div>
    <div class="step-item">
      <div class="step-num step-next">3</div>
      <div><strong>利用開始</strong><br><span class="text-muted" style="font-size:.8rem;">承認後にログインできます</span></div>
    </div>
  </div>

  <!-- メール通知ヒント -->
  <div class="mail-hint">
    <div class="d-flex align-items-start gap-2">
      <i class="bi bi-envelope-check" style="font-size:1.3rem;color:#f97316;flex-shrink:0;margin-top:2px;"></i>
      <div style="font-size:.85rem;color:#475569;text-align:left;">
        承認が完了しましたら、ご登録のメールアドレスに<strong style="color:#431407;">通知メール</strong>をお送りします。<br>
        メールが届きましたらログインしてください。
      </div>
    </div>
  </div>

  <hr class="my-3" style="opacity:.15;">
  <a href="/logout" class="btn btn-outline-secondary btn-sm" style="border-radius:12px;">
    <i class="bi bi-box-arrow-right me-1"></i>閉じる
  </a>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
