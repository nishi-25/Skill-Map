<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新規登録 - Skill View.</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: linear-gradient(135deg, #1a0900 0%, #431407 50%, #9a3412 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .auth-card { width: 100%; max-width: 440px; background: #fff; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,.4); padding: 2.5rem 2rem; }
    .brand { font-size: 1.8rem; font-weight: 800; color: #431407; }
    .brand span { background: linear-gradient(135deg, #f97316, #fdba74); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .btn-primary { background: #f97316; border-color: #f97316; }
    .btn-primary:hover { background: #ea580c; border-color: #ea580c; }
    .form-control:focus { border-color: #f97316; box-shadow: 0 0 0 .2rem rgba(249,115,22,.2); }
  </style>
</head>
<body>
<div class="auth-card">
  <div class="text-center mb-4">
    <i class="bi bi-map" style="font-size:2.5rem;color:#f97316;"></i>
    <div class="brand mt-2">Skill<span>View.</span></div>
    <p class="text-muted small mt-1">新しいアカウントを作成</p>
  </div>

  <div class="alert alert-info py-2 small">
    <i class="bi bi-info-circle-fill me-1"></i>登録後、管理者の承認が必要です。
  </div>

  {% if error %}
  <div class="alert alert-danger py-2 small">
    <i class="bi bi-exclamation-triangle-fill me-1"></i>{{ error }}
  </div>
  {% endif %}

  <form method="post" action="/register">
    <div class="mb-3">
      <label class="form-label small fw-semibold">ユーザー名 <span class="text-danger">*</span></label>
      <input type="text" name="username" class="form-control" required autofocus placeholder="半角英数字">
    </div>
    <div class="mb-3">
      <label class="form-label small fw-semibold">表示名</label>
      <input type="text" name="display_name" class="form-control" placeholder="フルネーム等">
    </div>
    <div class="mb-3">
      <label class="form-label small fw-semibold">メールアドレス</label>
      <input type="email" name="email" class="form-control" placeholder="example@company.com">
    </div>
    <div class="mb-4">
      <label class="form-label small fw-semibold">パスワード <span class="text-danger">*</span></label>
      <input type="password" name="password" class="form-control" required placeholder="6文字以上">
      <div class="form-text">6文字以上で設定してください</div>
    </div>
    <button type="submit" class="btn btn-primary w-100 fw-semibold py-2">
      <i class="bi bi-person-plus-fill me-2"></i>登録する
    </button>
  </form>

  <hr class="my-3">
  <div class="text-center">
    <a href="/login" class="text-muted small">すでにアカウントをお持ちの方はこちら</a>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
