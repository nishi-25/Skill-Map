<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>パスワードリセット - スキルマップ</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.bunny.net">
  <link href="https://fonts.bunny.net/css?family=inter:300,400,500,600,700|noto-sans-jp:400,500,700&display=swap" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #1a0900 0%, #431407 50%, #9a3412 100%);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      font-family: 'Inter', 'Noto Sans JP', sans-serif;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background-image: radial-gradient(circle at 20% 50%, rgba(249,115,22,.15) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(56,189,248,.1) 0%, transparent 50%),
                        radial-gradient(circle at 50% 80%, rgba(168,85,247,.1) 0%, transparent 50%);
      pointer-events: none;
    }
    .auth-card {
      width: 100%; max-width: 420px;
      background: rgba(255,255,255,.97);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,.4), 0 0 0 1px rgba(255,255,255,.1);
      padding: 2.5rem 2rem;
      position: relative; z-index: 1;
      animation: cardIn .5s cubic-bezier(.4,0,.2,1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(30px) scale(.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .brand { font-size: 1.5rem; font-weight: 800; color: #431407; }
    .brand span { background: linear-gradient(135deg, #f97316, #fdba74); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .btn-primary {
      background: linear-gradient(135deg, #f97316, #ea580c); border: none;
      transition: transform .2s, box-shadow .2s;
    }
    .btn-primary:hover { background: linear-gradient(135deg, #ea580c, #4338ca); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(249,115,22,.4); }
    .form-control:focus { border-color: #f97316; box-shadow: 0 0 0 .2rem rgba(249,115,22,.2); }
    .float-orb { position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; animation: float 6s ease-in-out infinite; }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
  </style>
</head>
<body>
<div class="float-orb" style="width:200px;height:200px;background:rgba(249,115,22,.08);top:10%;left:5%;"></div>
<div class="float-orb" style="width:150px;height:150px;background:rgba(56,189,248,.06);top:60%;right:10%;animation-delay:2s;"></div>

<div class="auth-card">
  <div class="text-center mb-4">
    <div style="width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,#22c55e,#16a34a);display:inline-flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(34,197,94,.3);">
      <i class="bi bi-key-fill" style="font-size:1.5rem;color:#fff;"></i>
    </div>
    <div class="brand mt-3">新しい<span>パスワード</span></div>
  </div>

  {% if error %}
  <div class="alert alert-danger py-2 small" style="border-radius:10px;">
    <i class="bi bi-exclamation-triangle-fill me-1"></i>{{ error }}
  </div>
  {% endif %}

  {% if token %}
  <p class="text-muted small text-center mb-3">
    新しいパスワードを入力してください（6文字以上）。
  </p>
  <form method="post" action="/reset-password">
    <input type="hidden" name="token" value="{{ token }}">
    <div class="mb-3">
      <label class="form-label small fw-semibold">新しいパスワード</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-lock"></i></span>
        <input type="password" name="new_password" id="newPw" class="form-control"
               required minlength="6" placeholder="6文字以上" style="border-radius:0 12px 12px 0;">
      </div>
    </div>
    <div class="form-check mb-3">
      <input class="form-check-input" type="checkbox" id="showPw"
             onchange="document.getElementById('newPw').type = this.checked ? 'text' : 'password'">
      <label class="form-check-label small text-muted" for="showPw">パスワードを表示</label>
    </div>
    <button type="submit" class="btn btn-primary w-100 fw-semibold py-2" style="border-radius:12px;">
      <i class="bi bi-check-lg me-2"></i>パスワードを変更
    </button>
  </form>
  {% else %}
  <div class="text-center">
    <a href="/forgot-password" class="btn btn-primary fw-semibold py-2 px-4" style="border-radius:12px;">
      <i class="bi bi-arrow-counterclockwise me-2"></i>再度リセットを申請する
    </a>
  </div>
  {% endif %}

  <a href="/login" class="btn btn-outline-secondary w-100 fw-semibold py-2 mt-3" style="border-radius:12px;">
    <i class="bi bi-arrow-left me-2"></i>ログイン画面に戻る
  </a>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
