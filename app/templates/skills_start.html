{% extends "base.html" %}
{% block title %}スキルマップ - Skill View.{% endblock %}

{% block content %}
<div class="page-header">
  <h1><i class="bi bi-lightning-charge me-2" style="color:#f97316;"></i><span data-i18n="page.skills">スキルマップ</span></h1>
  <p class="text-muted mb-0 small">スキルを選ぶ方法を選択してください</p>
</div>

<div class="row g-3 justify-content-center mt-3">
  <div class="col-md-6 col-lg-5">
    <a href="/skills" class="text-decoration-none">
      <div class="card h-100 start-choice-card"
           style="border-radius:18px;border:2px solid #e2e8f0;transition:transform .15s,box-shadow .15s,border-color .15s;"
           onmouseenter="this.style.transform='translateY(-4px)';this.style.boxShadow='0 10px 28px rgba(0,0,0,.1)';this.style.borderColor='#f97316';"
           onmouseleave="this.style.transform='';this.style.boxShadow='';this.style.borderColor='#e2e8f0';">
        <div class="card-body text-center py-5">
          <i class="bi bi-diagram-2 d-block mb-3" style="font-size:2.6rem;color:#f97316;"></i>
          <h5 class="fw-bold mb-2" style="color:#431407;">直接スキルを選択</h5>
          <p class="text-muted small mb-0">カテゴリからスキルを選んで、サブスキルをチェックします</p>
        </div>
      </div>
    </a>
  </div>
  <div class="col-md-6 col-lg-5">
    <a href="/skills/business-map" class="text-decoration-none">
      <div class="card h-100 start-choice-card"
           style="border-radius:18px;border:2px solid #e2e8f0;transition:transform .15s,box-shadow .15s,border-color .15s;"
           onmouseenter="this.style.transform='translateY(-4px)';this.style.boxShadow='0 10px 28px rgba(0,0,0,.1)';this.style.borderColor='#6366f1';"
           onmouseleave="this.style.transform='';this.style.boxShadow='';this.style.borderColor='#e2e8f0';">
        <div class="card-body text-center py-5">
          <i class="bi bi-diagram-3 d-block mb-3" style="font-size:2.6rem;color:#6366f1;"></i>
          <h5 class="fw-bold mb-2" style="color:#312e81;">業務マップから選択</h5>
          <p class="text-muted small mb-0">担当する業務（業務エリア）を選んで、そこに必要なスキルをチェックします</p>
        </div>
      </div>
    </a>
  </div>
</div>
{% endblock %}
